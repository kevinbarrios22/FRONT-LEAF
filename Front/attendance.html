<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Asistencia - Leaf Ltd</title>
    <link rel="icon" href="imagenes/icono.png" type="image/x-icon" />
    <link href="https://cdn.jsdelivr.net/npm/tabler@2.27.0/dist/css/tabler.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet" />
    <link href="css/dashboard.css" rel="stylesheet" />
</head>

<body>

    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <img src="imagenes/logo.png" alt="Leaf Ltd" class="sidebar-logo" />
                <span class="sidebar-brand-text">Leaf Ltd</span>
            </div>
            <nav class="sidebar-nav">
                <span class="sidebar-label">Navegación</span>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-avatar" id="avatarCircle">AD</div>
                    <div class="sidebar-user-info">
                        <div class="sidebar-user-name" id="navUsername">Admin</div>
                        <div class="sidebar-user-role" id="navRole">BOSS</div>
                    </div>
                    <a href="#" id="logoutBtnSidebar" class="sidebar-logout" title="Cerrar sesión">
                        <i class="ti ti-logout"></i>
                    </a>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <div class="main-content">

            <!-- Top bar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="sidebar-toggle" id="sidebarToggle">
                        <i class="ti ti-menu-2"></i>
                    </button>
                    <div>
                        <h1 class="topbar-title">Asistencia</h1>
                        <p class="topbar-subtitle">Control de entrada y salida</p>
                    </div>
                </div>
                <div class="topbar-right">
                    <div class="topbar-date">
                        <i class="ti ti-calendar"></i>
                        <span id="currentDate"></span>
                    </div>
                   
                </div>
            </header>

            <!-- Content -->
            <div class="content">

                <!-- Alert -->
                <div id="alert" class="alert" style="display:none"></div>

                <!-- Toolbar -->
                <div class="att-toolbar">
                    <div class="att-toolbar-left">
                        <div class="att-date-group">
                            <label class="att-date-label">Fecha</label>
                            <input type="date" class="att-date-input" id="attDate" />
                        </div>
                        <button class="att-btn att-btn-primary" id="btnToday">
                            <i class="ti ti-calendar-stats"></i> Hoy
                        </button>
                    </div>
                    <div class="att-toolbar-right">
                        <button class="att-btn att-btn-outline" id="btnRefresh">
                            <i class="ti ti-refresh"></i> Refrescar
                        </button>
                        <button class="att-btn att-btn-success" id="btnSave">
                            <i class="ti ti-device-floppy"></i> Guardar
                        </button>
                    </div>
                </div>

                <!-- Summary bar -->
                <div class="att-summary">
                    <div class="att-summary-item">
                        <span class="att-summary-value" id="sumTotal">0</span>
                        <span class="att-summary-label">Empleados</span>
                    </div>
                    <div class="att-summary-divider"></div>
                    <div class="att-summary-item">
                        <span class="att-summary-value att-summary-green" id="sumWorking">0</span>
                        <span class="att-summary-label">Trabajando</span>
                    </div>
                    <div class="att-summary-divider"></div>
                    <div class="att-summary-item">
                        <span class="att-summary-value att-summary-blue" id="sumRest">0</span>
                        <span class="att-summary-label">Descanso</span>
                    </div>
                    <div class="att-summary-divider"></div>
                    <div class="att-summary-item">
                        <span class="att-summary-value att-summary-amber" id="sumIncapacity">0</span>
                        <span class="att-summary-label">Incapacidad</span>
                    </div>
                    <div class="att-summary-divider"></div>
                    <div class="att-summary-item">
                        <span class="att-summary-value att-summary-red" id="sumHoliday">0</span>
                        <span class="att-summary-label">Festivo</span>
                    </div>
                    <div class="att-summary-divider"></div>
                    <div class="att-summary-item">
                        <span class="att-summary-value att-summary-gray" id="sumPending">0</span>
                        <span class="att-summary-label">Sin registro</span>
                    </div>
                </div>

                <!-- Table -->
                <div class="att-table-wrap">
                    <table class="att-table" id="attTable">
                        <thead>
                            <tr>
                                <th class="att-col-employee">Empleado</th>
                                <th class="att-col-date">Fecha</th>
                                <th class="att-col-time">Hora entrada</th>
                                <th class="att-col-time">Hora salida</th>
                                <th class="att-col-status">Novedad</th>
                            </tr>
                        </thead>
                        <tbody id="attBody">
                            <tr id="attRowLoading">
                                <td colspan="5" class="att-empty">
                                    <i class="ti ti-loader"></i> Cargando empleados...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/attendance.js"></script>
</body>

</html>
